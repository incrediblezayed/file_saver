name: file_saver
description: Save files from bytes, paths, streams, and URLs across Android, iOS, Web, Windows, macOS, and Linux.
version: 0.4.0
repository: https://github.com/incrediblezayed/file_saver
homepage: https://hassanansari.dev

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  collection: ^1.19.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  path_provider: ^2.1.5
  web: ^1.1.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.incrediblezayed.file_saver
        pluginClass: FileSaverPlugin
      ios:
        pluginClass: FileSaverPlugin
      linux:
        pluginClass: FileSaverPlugin
      macos:
        pluginClass: FileSaverPlugin
      windows:
        pluginClass: FileSaverPlugin
      web:
        pluginClass: FileSaverWeb
        fileName: file_saver_web.dart
